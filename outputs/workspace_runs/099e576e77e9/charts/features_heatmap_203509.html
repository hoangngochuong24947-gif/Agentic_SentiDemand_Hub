            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;

            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
            background-image:

        }

        .header {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 20px;
            animation: fadeDown 0.6s ease-out;
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .header .meta {
            display: flex;
            gap: 20px;
            margin-top: 8px;
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        .header .meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .chart-card {
            width: 100%;
            max-width: 1200px;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 28px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.03);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            animation: fadeUp 0.8s ease-out;
        }

        .chart-card:hover {
            border-color: var(--border-glow-hover);
            box-shadow: 0 8px 40px rgba(59, 130, 246, 0.1), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        #chart-container {
            width: 100%;
            height: 520px;
            min-height: 400px;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            animation: fadeUp 1s ease-out;
        }

        .footer a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .chart-card { padding: 16px; border-radius: 12px; }
            .header h1 { font-size: 1.2rem; }
            #chart-container { height: 350px; min-height: 300px; }
        }
